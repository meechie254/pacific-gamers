<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Level Not Found | Pacific Gamers</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .not-found-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(10, 10, 10, 0.8), rgba(10, 10, 10, 0.95)), url('img/ac_mirage.png') center/cover;
        }
        .not-found-container h1 {
            font-size: 8rem;
            color: var(--primary);
            text-shadow: 0 0 30px var(--primary);
            margin: 0;
            line-height: 1;
        }
        .not-found-container p {
            font-size: 1.5rem;
            color: var(--text-dim);
            margin-bottom: 30px;
            max-width: 600px;
        }
        .back-btn {
            background: var(--primary);
            color: var(--bg-dark);
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: var(--transition);
        }
        .back-btn:hover {
            box-shadow: 0 0 20px var(--primary);
            background: white;
            color: black;
        }
    </style>
</head>
<body>
    <div class="not-found-container">
        <h1>404</h1>
        <p>Game Over! The level you're looking for was either deleted, moved, or never existed in the first place.</p>
        <a href="index.html" class="back-btn">Return to Base</a>
    </div>
</body>
</html>
