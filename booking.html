<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book a Service - Zenca Gamers</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <h1>Zenca Gamers</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="booking.html">Booking</a></li>
      <li><a href="info.html">Info</a></li>
      <li><a href="checkout.html">Checkout</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <!-- Booking Section -->
  <section class="booking">
    <h2>Book a Service</h2>
    <div id="bookingStatus" style="padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none;"></div>
    <form id="bookingForm">
      <label for="name">Full Name:</label>
      <input type="text" id="name" required placeholder="Enter your full name">
      
      <label for="email">Email Address:</label>
      <input type="email" id="email" required placeholder="Enter your email">
      
      <label for="phone">Phone Number:</label>
      <input type="text" id="phone" required placeholder="Enter your phone number">
      
      <label for="tournament">Select Tournament/Service:</label>
      <select id="tournament" required>
        <option value="FIFA 25 Discovery">FIFA 25 Discovery Tournament</option>
        <option value="Tekken 8 Clash">Tekken 8 Clash</option>
        <option value="Console Repair">Console/PC Repair</option>
        <option value="PC Upgrade">PC Upgrade Consultation</option>
      </select>

      <label for="date">Preferred Date:</label>
      <input type="date" id="date" required>
      
      <label for="message">Additional Requirements:</label>
      <textarea id="message" placeholder="Tell us more about your request..."></textarea>
      
      <button type="submit" id="submitBtn">Confirm Booking</button>
    </form>
  </section>

  <script>
    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('bookingStatus');
        
        btn.disabled = true;
        btn.textContent = 'Submitting...';

        const data = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            tournament: document.getElementById('tournament').value,
            date: document.getElementById('date').value,
            message: document.getElementById('message').value
        };

        try {
            const res = await fetch('/api/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await res.json();
            if (result.message) {
                status.textContent = result.message;
                status.style.background = 'rgba(0, 255, 204, 0.1)';
                status.style.color = 'var(--primary)';
                status.style.display = 'block';
                document.getElementById('bookingForm').reset();
            } else {
                throw new Error(result.error || 'Unknown error');
            }
        } catch (err) {
            status.textContent = 'Error: ' + err.message;
            status.style.background = 'rgba(255, 68, 68, 0.1)';
            status.style.color = '#ff4444';
            status.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Submit Booking';
        }
    });
  </script>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 Zenca Gamers. All rights reserved. | Follow us on Instagram, TikTok, YouTube</p>
  </footer>
</body>
</html>
